apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namePrefix: dev-
patches:
  - target:
      kind: Deployment
      name: bff
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: dev-bff-config
  - target:
      kind: ConfigMap
      name: bff-config
    patch: |-
      - op: replace
        path: /data/NODE_ENV
        value: "development"
