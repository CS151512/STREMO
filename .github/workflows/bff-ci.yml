name: BFF Service CI (Rust)

on:
  push:
    branches: ["dev", "main"]
    paths:
      - "backend/service/bff_service/**"
      - "backend/libs/rust-core/**"
      - "backend/proto/**"
      - ".github/workflows/bff-ci.yml"
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "backend/service/bff_service/**"
      - "backend/libs/rust-core/**"
      - "backend/proto/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  WORKING_DIR: backend/service/bff_service

jobs:
  lint-and-format:
    name: Code Quality (Fmt & Clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check Formatting
        working-directory: ${{ env.WORKING_DIR }}
        run: cargo fmt --all -- --check

      - name: Run Clippy (Strict Mode)
        working-directory: ${{ env.WORKING_DIR }}
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  security-audit:
    name: Security Audit (Cargo Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run Vulnerability Scan
        working-directory: backend
        run: cargo audit

  test-and-coverage:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint-and-format, security-audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run Tests & Generate Coverage
        working-directory: ${{ env.WORKING_DIR }}
        run: cargo llvm-cov test -p bff-service -all-features --lcov --output-path lcov.info --fail-under-lines 15

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ${{ env.WORKING_DIR }}/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-build-scan:
    name: Build Docker & Trivy Scan
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/service/bff_service/Dockerfile
          push: false
          tags: stremo/bff-service:dev-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "stremo/bff-service:dev-test"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
