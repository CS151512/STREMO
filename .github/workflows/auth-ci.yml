name: Auth Service CI (C++)

on:
  push:
    branches: ["dev", "main"]
    paths:
      - "backend/service/auth-service/**"
      - "backend/libs/cpp-core/**"
      - "backend/proto/**"
      - ".github/workflows/auth-ci.yml"
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "backend/service/auth-service/**"
      - "backend/libs/cpp-core/**"
      - "backend/proto/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKING_DIR: backend
  SERVICE_DIR: backend/service/auth-service

jobs:
  lint:
    name: Code Quality (Clang-Format & Clang-Tidy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy

      - name: Check Formatting
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          find src include tests -name "*.cpp" -o -name "*.hpp" | xargs clang-format --Werror --dry-run

  build-and-test:
    name: Build & Unit Tests (GTest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install C++ Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config \
                                  libprotobuf-dev protobuf-compiler \
                                  libgrpc++-dev protobuf-compiler-grpc \
                                  libgtest-dev

      - name: Configure CMake
        working-directory: ${{ env.WORKING_DIR }}
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug

      - name: Build Auth Service & Tests
        working-directory: ${{ env.WORKING_DIR }}
        run: cmake --build build --target auth_service_test -j$(nproc)

      - name: Run CTest
        working-directory: ${{ env.WORKING_DIR }}/build/service/auth-service
        run: ctest --output-on-failure

  docker-build-scan:
    name: Build Docker & Trivy Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: ${{ env.SERVICE_DIR }}/Dockerfile
          push: false
          load: true
          tags: stremo/auth-service:dev-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "stremo/auth-service:dev-test"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
