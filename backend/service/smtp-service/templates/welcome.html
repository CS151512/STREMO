<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Добро пожаловать в STREMO</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px;">
        <h2 style="color: #6441a5; text-align: center;">STREMO</h2>
        <h3>Привет, {{.Username}}!</h3>
        <p>Мы рады приветствовать тебя на новой интерактивной стриминговой платформе.</p>
        <p>Чтобы подтвердить свой аккаунт и начать стримить или общаться в чате, нажми на кнопку ниже:</p>
        <div style="text-align: center; margin-top: 30px; margin-bottom: 30px;">
            <a href="{{.VerificationLink}}" style="background-color: #6441a5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; font-weight: bold;">Подтвердить Email</a>
        </div>
        <hr style="border: none; border-top: 1px solid #eeeeee;">
        <p style="font-size: 12px; color: #888888; text-align: center;">Если ты не регистрировался на STREMO, просто проигнорируй это письмо.</p>
    </div>
</body>
</html>
